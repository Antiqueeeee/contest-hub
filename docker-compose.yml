version: "3.8"

services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: contest
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: contest_hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contest -d contest_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: contest
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: contest_hub
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-120}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      EXPORT_DIR: /app/exports
    volumes:
      - exports:/app/exports

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
  exports:
